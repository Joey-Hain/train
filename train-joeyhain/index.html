            <!-- Paste this block into any page, e.g. inside <main class="content"> -->

<section class="videos">
  <h2>Latest videos</h2>
  <div id="video-list" class="video-list">Loading…</div>
</section>

<script>
  (function () {
    var container = document.getElementById('video-list');

    fetch('/api/videos')
      .then(function (r) { return r.json(); })
      .then(function (videos) {
        if (!videos.length) {
          container.textContent = 'No videos yet.';
          return;
        }
        container.innerHTML = '';
        videos.forEach(function (v) {
          var a = document.createElement('a');
          a.className = 'video-card';
          a.href = v.url;
          a.target = '_blank';
          a.rel = 'noopener';

          var img = document.createElement('img');
          img.src = v.thumbnail;
          img.alt = v.title;
          img.loading = 'lazy';

          var title = document.createElement('span');
          title.className = 'video-title';
          title.textContent = v.title;

          a.appendChild(img);
          a.appendChild(title);
          container.appendChild(a);
        });
      })
      .catch(function () {
        container.textContent = "Couldn't load videos right now.";
      });
  })();
</script>
    </main>
  </div>

</body>
